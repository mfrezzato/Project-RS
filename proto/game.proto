syntax = "proto3";

package projetors;

import "google/protobuf/empty.proto";

service MageService {
  rpc CastSpell (SpellRequest) returns (SpellResponse);
  rpc UpdatePosition (MoveRequest) returns (google.protobuf.Empty);
  rpc SendMessage (ChatMessage) returns (google.protobuf.Empty);
  rpc LeaveGame (LeaveRequest) returns (google.protobuf.Empty);
  rpc SyncState (StateRequest) returns (google.protobuf.Empty);
  rpc Heartbeat (Ping) returns (Pong);
  rpc PlayerDied(PlayerDiedRequest) returns (google.protobuf.Empty);
}

message SpellRequest {
  string attacker_id   = 1;
  string attacker_name = 2;
  int32  damage        = 3;
  string element_type  = 4;
  string target_id     = 5;  
}

message SpellResponse {
  bool   shielded    = 1;
  int32  current_hp  = 2;
  string message     = 3;
}

message MoveRequest {
  string player_id = 1;
  string room_id   = 2;
}

message ChatMessage {
  string player_id   = 1;
  string sender_name = 2;
  string content     = 3;
  string room_id     = 4;
}

message LeaveRequest {
  string player_id = 1;
}

message StateRequest {
  string player_id   = 1;
  string player_name = 2;
  string class_type  = 3;
  int32  hp          = 4;
  int32  mana        = 5;
  string room_id     = 6;
}

message Ping {
  string player_id = 1;
}

message Pong {
  bool alive = 1;
}

message PlayerDiedRequest {
  string player_id = 1;
}